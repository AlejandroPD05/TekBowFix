name: Build Plugin

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSVC (Compilador nativo)
      uses: ilammy/msvc-dev-cmd@v1

    - name: Clone AseApi SDK (Público)
      run: |
        git clone https://github.com/ArkServerApi/AseApi.git AseApiSource

    - name: Compile DLL Directo
      run: |
        cl.exe /LD /O2 /EHsc /I"AseApiSource/include" TekBowFix.cpp /link /LIBPATH:"AseApiSource/lib" ArkServerApi.lib /OUT:TekBowFix.dll

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TekBowFix-Binario
        path: TekBowFix.dll
