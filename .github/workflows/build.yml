name: Build Plugin

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSVC (Compilador nativo)
      uses: ilammy/msvc-dev-cmd@v1

    - name: Clone ArkServerAPI Source (Headers y Libs)
      run: |
        git clone https://github.com/ServersHub/Ark-Server-API.git ArkApiSource

    - name: Compile DLL Directo
      run: |
        cl.exe /LD /O2 /EHsc /I"ArkApiSource/v3.0/Developer/Header" TekBowFix.cpp /link /LIBPATH:"ArkApiSource/v3.0/Developer/Lib" ArkServerApi.lib /OUT:TekBowFix.dll

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TekBowFix-Binario
        path: TekBowFix.dll
